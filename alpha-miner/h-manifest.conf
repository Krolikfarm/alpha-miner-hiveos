# Custom miner manifest for HiveOS — alpha-miner (alphapool.tech)
CUSTOM_NAME=alpha-miner
CUSTOM_VERSION=1.3
CUSTOM_BUILD=4

# Config file generated by h-config.sh and read by h-run.sh
CUSTOM_CONFIG_FILENAME=alpha-miner.conf

# Base name for the miner log file (HiveOS appends .log / _date.log)
CUSTOM_LOG_BASENAME=alpha-miner
